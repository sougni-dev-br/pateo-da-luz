databases:
  - name: pateo-postgres
    plan: free
    databaseName: pateo
    user: pateo

services:
  - type: web
    name: pateo-backend
    runtime: node
    rootDir: backend
    plan: free
    region: oregon
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run prisma:deploy && npm run start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pateo-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://pateo.sougni.com
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22.13.1"
